backend:
  name: github
  repo: kmukawa0126/kmukawa-website
  branch: main
  # GitHub OAuth プロキシ = Cloudflare Worker (公式 sveltia-cms-auth)。
  # Netlify Functions から移行 (2026-05-31)。Worker は /auth と /callback を処理。
  # ↓ Worker デプロイ後の実 URL に必ず置き換える。
  #   例: https://sveltia-cms-auth.<あなたのsubdomain>.workers.dev
  #   手順書: docs/CMS_AUTH_CLOUDFLARE.md
  base_url: https://sveltia-cms-auth.kmukawa0126.workers.dev
  # auth_endpoint は既定値 (auth) を使用するため指定しない

media_folder: "images/blog"
public_folder: "/images/blog"

locale: ja

collections:
  - name: "blog"
    label: "ブログ記事"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "投稿日", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "一覧表示用の説明文（120文字以内）", name: "description", widget: "text", required: false }
      - { label: "サムネイル画像", name: "thumbnail", widget: "image", required: false }
      - { label: "本文", name: "body", widget: "markdown" }
